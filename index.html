<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colorful Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:350px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.form-container h2{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus, textarea:focus, select:focus{
    border-color:#4facfe;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#4facfe;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#007bff;
}
</style>

</head>

<body>

<div class="form-container">
<h2>Registration Form</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Password</label>
<input type="password" placeholder="Enter password">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Message</label>
<textarea rows="3" placeholder="Write something..."></textarea>

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
