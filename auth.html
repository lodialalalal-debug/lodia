<!DOCTYPE html>
<html>

<head>
    <title>Login / Signup</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }
        
        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }
        
        button {
            padding: 10px;
            width: 100%;
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        .toggle {
            margin-top: 10px;
            color: blue;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 id="title">Login</h2>

        <form id="form">
            <input type="text" id="name" placeholder="Name" style="display:none;">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Submit</button>
        </form>

        <p class="toggle" onclick="toggleForm()">Switch to Signup</p>

    </div>

    <script>
        let isLogin = true;

        function toggleForm() {
            isLogin = !isLogin;

            document.getElementById("title").innerText = isLogin ? "Login" : "Signup";
            document.getElementById("name").style.display = isLogin ? "none" : "block";
            document.querySelector(".toggle").innerText = isLogin ?
                "Switch to Signup" :
                "Switch to Login";
        }

        // MAIN LOGIC
        document.getElementById("form").addEventListener("submit", async function(e) {
            e.preventDefault();

            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            };

            const url = isLogin ?
                "http://localhost:3000/login" :
                "http://localhost:3000/signup";

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    alert(result.message);

                    if (isLogin) {
                        window.location.href = "dashboard.html";
                    }
                } else {
                    alert(result.message || "Error");
                }

            } catch (error) {
                console.error(error);
                alert("Server not reachable");
            }
        });
    </script>

</body>

</html>
